<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>auditguard-mcp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-page: #0f1117;
    --bg-surface: #161b22;
    --bg-raised: #1c2128;
    --bg-elevated: #21262d;
    --border: #30363d;
    --border-strong: #484f58;
    --text: #e6edf3;
    --text-body: #b1bac4;
    --text-dim: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-dim: rgba(88,166,255,0.12);
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.12);
    --amber: #d29922;
    --amber-dim: rgba(210,153,34,0.12);
    --red: #f85149;
    --red-dim: rgba(248,81,73,0.12);
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg-page);
    color: var(--text-body);
    height: 100vh;
    overflow: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-size: 17px;
  }

  /* ── Shell: single vertical flow ── */
  .shell {
    display: grid;
    grid-template-rows: auto auto auto auto 1fr;
    height: 100vh;
    max-width: 100%;
    margin: 0 auto;
  }

  /* ── Header ── */
  .hdr {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .hdr h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .hdr-sep {
    color: var(--text-muted);
    font-size: 12px;
    margin: 0 2px;
  }
  .hdr-sub {
    font-size: 13px;
    color: var(--text-muted);
  }
  .hdr-right { margin-left: auto; }
  .hdr-right a {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  .hdr-right a:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Scenarios: primary interaction ── */
  .scenarios {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
  }
  .sc-btn {
    background: var(--bg-surface);
    border: none;
    padding: 16px 24px 16px 28px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    position: relative;
  }
  .sc-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: transparent;
    transition: background 0.2s;
  }
  .sc-btn:hover { background: var(--bg-raised); }
  .sc-btn.active { background: var(--bg-raised); }
  .sc-btn.active::after { background: var(--accent); }
  .sc-btn .sc-role {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 3px;
  }
  .sc-btn.active .sc-role { color: var(--accent); }
  .sc-btn .sc-title {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .sc-btn .sc-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.4;
    margin-top: 3px;
  }

  /* ── Query context bar ── */
  .ctx {
    display: none;
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    gap: 16px;
    align-items: baseline;
  }
  .ctx.show { display: flex; flex-wrap: wrap; }
  .ctx-role {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .ctx-sql {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    white-space: normal;
    word-break: break-all;
    flex: 1;
    min-width: 200px;
    line-height: 1.5;
  }
  .ctx-latency {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .ctx-backend {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 3px 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .ctx-backend.async {
    color: var(--text-dim);
    background: var(--bg-elevated);
  }
  .ctx-backend.temporal {
    color: var(--amber);
    background: var(--amber-dim);
  }
  .ctx-backend-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    display: inline-block;
  }
  .ctx-backend.async .ctx-backend-dot { background: var(--text-dim); }
  .ctx-backend.temporal .ctx-backend-dot { background: var(--amber); }

  /* ── Pipeline ── */
  .pipe-track {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-page);
  }
  .pipe {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  .p-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex: 1;
    min-width: 0;
  }

  .p-node {
    width: 38px; height: 38px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    background: var(--bg-elevated);
    color: var(--text-muted);
    border: 1px solid var(--border);
    transition: all 0.25s ease;
  }
  .p-node.pass {
    background: var(--green-dim);
    color: var(--green);
    border-color: rgba(63,185,80,0.25);
  }
  .p-node.transform {
    background: var(--amber-dim);
    color: var(--amber);
    border-color: rgba(210,153,34,0.25);
  }
  .p-node.fail {
    background: var(--red-dim);
    color: var(--red);
    border-color: rgba(248,81,73,0.25);
  }
  .p-node.skipped { opacity: 0.25; }
  .p-node.pending { color: var(--border-strong); }
  .p-node.running {
    animation: pulse 1s ease-in-out infinite;
    border-color: var(--accent);
    color: var(--accent);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .p-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    text-align: center;
  }

  .p-info {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    min-height: 12px;
  }
  .p-info.has { color: var(--text-dim); }

  .p-arrow {
    display: flex;
    align-items: center;
    padding-top: 14px;
    flex-shrink: 0;
  }
  .p-arrow-line {
    width: 16px; height: 1px;
    background: var(--border-strong);
  }

  /* ── Results area (scrollable) ── */
  .results {
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
  }

  .results-inner {
    padding: 20px 28px 0;
  }

  /* ── Empty state ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ── Insight ── */
  .insight {
    display: none;
    padding: 16px 24px;
    margin-bottom: 20px;
    border-left: 2px solid var(--accent);
    background: rgba(88,166,255,0.04);
    border-radius: 0 4px 4px 0;
  }
  .insight.show { display: block; }
  .insight-head {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .insight-body {
    font-size: 14px;
    color: var(--text-body);
    line-height: 1.6;
  }
  .insight-body strong { color: var(--text); font-weight: 600; }
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 12px;
    padding: 1px 7px;
    border-radius: 3px;
    margin: 0 1px;
    vertical-align: baseline;
    font-weight: 500;
  }
  .tag-allow { background: var(--green-dim); color: var(--green); }
  .tag-block { background: var(--red-dim); color: var(--red); }
  .tag-dim { background: var(--bg-elevated); color: var(--text-dim); }

  /* ── Data table card ── */
  .tbl-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-surface);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .tbl-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-raised);
  }
  .tbl-card-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
  }
  .tbl-card-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .tbl th {
    text-align: left;
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg-raised);
  }
  .tbl td {
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-body);
    border-bottom: 1px solid var(--border);
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .redacted {
    color: var(--red);
    background: var(--red-dim);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
  }
  .tbl .num { color: var(--accent); }

  /* ── Error ── */
  .err-msg {
    font-family: var(--mono);
    color: var(--red);
    padding: 12px 0;
    font-size: 14px;
  }
  .blocked-msg {
    font-family: var(--mono);
    color: var(--text-dim);
    padding: 12px 0;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Audit section ── */
  .audit {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-surface);
    overflow: hidden;
    margin-top: 20px;
    margin-bottom: 20px;
  }
  .audit-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    padding: 12px 16px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border);
  }
  .audit-toggle:hover .audit-label { color: var(--text-dim); }
  .audit-arrow {
    font-size: 8px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .audit-toggle.open .audit-arrow { transform: rotate(180deg); }
  .audit-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .audit-spacer { flex: 1; }
  .audit-link {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    text-decoration: none;
    border-bottom: 1px solid rgba(210,153,34,0.3);
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .audit-link:hover { border-color: var(--amber); }
  .audit-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .audit-pre-wrap {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .audit-pre-wrap.open { max-height: 300px; overflow-y: auto; }
  .audit-pre {
    margin: 0;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.65;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .json-key { color: #79c0ff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="hdr">
    <span class="hdr-dot"></span>
    <h1>auditguard-mcp</h1>
    <span class="hdr-sep">&middot;</span>
    <span class="hdr-sub">compliance-aware MCP with real-time PII filtering</span>
    <span class="hdr-right"><a href="https://github.com/ree2raz/auditguard-mcp" target="_blank">source</a></span>
  </div>

  <!-- Scenarios -->
  <div class="scenarios">
    <button class="sc-btn" data-sc="analyst" onclick="load('analyst')">
      <div class="sc-role">Analyst</div>
      <div class="sc-title">PII Protection</div>
      <div class="sc-desc">Names hashed, emails allowed. SSN and account_number columns restricted.</div>
    </button>
    <button class="sc-btn" data-sc="intern" onclick="load('intern')">
      <div class="sc-role">Intern</div>
      <div class="sc-title">Access Denied</div>
      <div class="sc-desc">Zero tool permissions. Blocked at the RBAC gate immediately.</div>
    </button>
    <button class="sc-btn" data-sc="compliance" onclick="load('compliance')">
      <div class="sc-role">Officer</div>
      <div class="sc-title">Restricted Columns</div>
      <div class="sc-desc">Queries SSN and account_number. Analysts cannot run this.</div>
    </button>
  </div>

  <!-- Context bar (shows after scenario selected) -->
  <div class="ctx" id="ctx">
    <span class="ctx-role" id="ctxRole"></span>
    <span class="ctx-backend async" id="ctxBackend" style="display:none;">
      <span class="ctx-backend-dot"></span>
      <span id="ctxBackendLabel"></span>
    </span>
    <span class="ctx-sql" id="ctxSql"></span>
    <span class="ctx-latency" id="ctxLatency"></span>
  </div>

  <!-- Pipeline -->
  <div class="pipe-track">
    <div class="pipe" id="pipeline"></div>
  </div>

  <!-- Results: insight + output + audit -->
  <div class="results" id="results">
    <div class="empty" id="emptyState">
      <div class="empty-title">Select a scenario above</div>
      <div class="empty-sub">Each demonstrates a different compliance outcome</div>
    </div>
    <div class="results-inner" id="resultsInner" style="display:none;">
      <div class="insight" id="insight">
        <div class="insight-head">What happened</div>
        <div class="insight-body" id="insightBody"></div>
      </div>
      <div id="rBody"></div>
      <div class="audit" id="auditSection" style="display:none;">
        <div class="audit-toggle open" id="auditTrigger" onclick="toggleAudit()">
          <span class="audit-arrow">&#9660;</span>
          <span class="audit-label">Audit Log</span>
          <span class="audit-spacer"></span>
          <span class="audit-meta" id="auditMeta"></span>
          <a class="audit-link" id="auditTemporalLink" style="display:none;" href="#" target="_blank">View in Temporal &#8599;</a>
        </div>
        <div class="audit-pre-wrap open" id="auditWrap">
          <pre class="audit-pre" id="auditBody"></pre>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
var STEPS = [
  { id: 1, label: 'RBAC' },
  { id: 2, label: 'PII in' },
  { id: 3, label: 'Policy' },
  { id: 4, label: 'Exec' },
  { id: 5, label: 'PII out' },
  { id: 6, label: 'Policy' },
  { id: 7, label: 'Audit' },
];

var ICONS = {
  pass: '\u2713',
  transform: '\u26A1',
  fail: '\u2717',
  skipped: '\u2298',
  pending: '\u25CB',
};

var SC = {
  analyst: {
    role: 'analyst',
    query: 'Show me the top 3 customers by account balance',
    sql: "SELECT c.first_name, c.last_name, c.email, a.balance\nFROM customers c\nJOIN accounts a ON c.id = a.customer_id\nORDER BY a.balance DESC\nLIMIT 3"
  },
  intern: {
    role: 'intern',
    query: 'Show me all customer data including SSNs',
    sql: 'SELECT * FROM customers'
  },
  compliance: {
    role: 'compliance_officer',
    query: 'Show top customers with SSN and account numbers',
    sql: "SELECT c.first_name, c.last_name, c.ssn, a.account_number, a.balance, a.account_type\nFROM customers c\nJOIN accounts a ON c.id = a.customer_id\nORDER BY a.balance DESC\nLIMIT 3"
  }
};

function buildPipeline() {
  var el = document.getElementById('pipeline');
  var h = '';
  STEPS.forEach(function(s, i) {
    if (i > 0) h += '<div class="p-arrow"><div class="p-arrow-line"></div></div>';
    h += '<div class="p-step">'
      + '<div class="p-node pending" id="n' + s.id + '">' + ICONS.pending + '</div>'
      + '<div class="p-label">' + s.label + '</div>'
      + '<div class="p-info" id="d' + s.id + '"></div>'
      + '</div>';
  });
  el.innerHTML = h;
}
buildPipeline();

var _lastKey = '';

function load(name) {
  var s = SC[name];
  document.querySelectorAll('.sc-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-sc="' + name + '"]').classList.add('active');

  document.getElementById('ctxRole').textContent = s.role;
  document.getElementById('ctxSql').textContent = s.sql.replace(/\n/g, ' ');
  document.getElementById('ctxLatency').textContent = '';
  document.getElementById('ctx').classList.add('show');

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsInner').style.display = 'block';

  var key = s.role + '|' + s.sql;
  if (key !== _lastKey) { _lastKey = key; run(s.role, s.query, s.sql); }
}

var sid = null;

async function mcpFetch(json) {
  var h = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' };
  if (sid) h['Mcp-Session-Id'] = sid;
  var r = await fetch('/mcp', { method: 'POST', headers: h, body: JSON.stringify(json) });
  if (!r.ok) { var t = await r.text(); throw new Error('MCP ' + r.status + ': ' + t); }
  var hs = r.headers.get('Mcp-Session-Id') || r.headers.get('mcp-session-id');
  if (hs) sid = hs;
  var txt = await r.text();
  if (txt.startsWith('event:')) {
    var lines = txt.split(/\r?\n/);
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].startsWith('data:')) return JSON.parse(lines[i].substring(5).trim());
    }
    throw new Error('SSE had no data');
  }
  try { return JSON.parse(txt); }
  catch(e) { throw new Error('Parse error: ' + txt.substring(0, 200)); }
}

async function init() {
  if (sid) return;
  var d = await mcpFetch({ jsonrpc: '2.0', id: 1, method: 'initialize', params: { protocolVersion: '2025-03-26', capabilities: {}, clientInfo: { name: 'web', version: '1.0' } } });
  if (d.error) throw new Error('Init: ' + d.error.message);
}

function resetPipeline() {
  STEPS.forEach(function(s) {
    var el = document.getElementById('n' + s.id);
    el.className = 'p-node pending'; el.textContent = ICONS.pending;
    var d = document.getElementById('d' + s.id);
    d.textContent = ''; d.classList.remove('has');
  });
}

function animate(steps) {
  if (!steps || !steps.length) return;
  resetPipeline();
  steps.forEach(function(step, i) {
    var n = i + 1;
    setTimeout(function() {
      var el = document.getElementById('n' + n);
      el.className = 'p-node ' + step.status;
      el.textContent = ICONS[step.status] || n;
      var dd = document.getElementById('d' + n);
      var det = step.detail || {};
      var txt = '';
      if (det.reason) txt = det.reason;
      else if (det.detections !== undefined) txt = det.detections + ' found';
      else if (det.latency_ms !== undefined) txt = Math.round(det.latency_ms) + 'ms';
      else if (det.decisions && det.decisions.length) txt = det.decisions.map(function(x) { return x.action; }).join(', ');
      else if (det.status) txt = det.status;
      if (txt) { dd.textContent = txt; dd.classList.add('has'); }
    }, i * 160);
  });
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTable(raw) {
  try {
    var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (!Array.isArray(data) || !data.length) return null;
    var keys = Object.keys(data[0]);
    var useful = keys.filter(function(k) { return !k.match(/^(id|customer_id|account_id|advisor_id)$/i); });
    var redactCount = 0;
    data.forEach(function(row) {
      Object.values(row).forEach(function(v) {
        if (String(v).startsWith('[private_') && (String(v).endsWith(']') || String(v).indexOf(']') > 0)) redactCount++;
      });
    });
    var meta = data.length + ' row' + (data.length === 1 ? '' : 's');
    if (redactCount > 0) meta += ' \u00B7 ' + redactCount + ' field' + (redactCount === 1 ? '' : 's') + ' protected';
    var h = '<div class="tbl-card">';
    h += '<div class="tbl-card-head"><span class="tbl-card-title">Query Results</span><span class="tbl-card-meta">' + meta + '</span></div>';
    h += '<table class="tbl"><thead><tr>';
    useful.forEach(function(k) { h += '<th>' + esc(k) + '</th>'; });
    h += '</tr></thead><tbody>';
    data.forEach(function(row) {
      h += '<tr>';
      useful.forEach(function(k) {
        var v = String(row[k] || '');
        if (v.startsWith('[private_')) h += '<td><span class="redacted">' + esc(v) + '</span></td>';
        else if (/^-?\d+\.?\d*$/.test(v) && v.length > 3) h += '<td class="num">' + esc(v) + '</td>';
        else h += '<td>' + esc(v) + '</td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    return h;
  } catch(e) { return null; }
}

function jstr(o) {
  try {
    var json = typeof o === 'string' ? JSON.parse(o) : o;
    var s = JSON.stringify(json, null, 2);
    s = esc(s);
    s = s.replace(/(&quot;[a-zA-Z0-9_]+&quot;)(\s*:)/g, '<span class="json-key">$1</span>$2');
    return s;
  } catch(e) { return esc(String(o)); }
}

function toggleAudit() {
  document.getElementById('auditTrigger').classList.toggle('open');
  document.getElementById('auditWrap').classList.toggle('open');
}

function renderInsight(role, status, audit) {
  var el = document.getElementById('insight');
  var body = document.getElementById('insightBody');
  function block(s) { return '<span class="tag tag-block">' + s + '</span>'; }
  function allow(s) { return '<span class="tag tag-allow">' + s + '</span>'; }
  function dim(s) { return '<span class="tag tag-dim">' + s + '</span>'; }
  var html = '';
  if (role === 'intern') {
    html = '<strong>Zero tool permissions.</strong> Denied at the RBAC gate. '
      + 'No PII scan, no policy check, no execution. '
      + block('sql_query') + ' ' + block('customer_api') + ' both restricted.';
  } else if (role === 'analyst') {
    var n = (audit && audit.outbound_detections) ? audit.outbound_detections.length : 0;
    html = '<strong>Partial access.</strong> '
      + allow('sql_query') + ' ' + allow('customer_api') + ' ' + dim('no admin')
      + ' &middot; ' + block('ssn') + ' ' + block('account_number') + ' columns restricted. '
      + 'Outbound: <strong>' + n + '</strong> PII detection' + (n === 1 ? '' : 's') + '. Names hashed, emails allowed.';
  } else if (role === 'compliance_officer') {
    var n2 = (audit && audit.outbound_detections) ? audit.outbound_detections.length : 0;
    html = '<strong>Full column access.</strong> '
      + 'This query reads ' + allow('ssn') + ' ' + allow('account_number')
      + ' — columns that are ' + block('restricted') + ' for analysts. '
      + 'Strict policy still filters <strong>' + n2 + '</strong> PII span' + (n2 === 1 ? '' : 's') + ' on output. '
      + '<span style="color:var(--text-dim)">If an analyst ran this, it would be denied at step 1.</span>';
  } else {
    html = 'Role: ' + esc(role);
  }
  body.innerHTML = html;
  el.classList.add('show');
}

async function run(role, query, sql) {
  var body = document.getElementById('rBody');
  var insightEl = document.getElementById('insight');
  var auditSection = document.getElementById('auditSection');

  body.innerHTML = '';
  insightEl.classList.remove('show');
  auditSection.style.display = 'none';
  document.getElementById('ctxBackend').style.display = 'none';
  document.getElementById('auditTemporalLink').style.display = 'none';
  document.getElementById('auditMeta').textContent = '';
  resetPipeline();

  try {
    await init();
    var txt = await mcpFetch({
      jsonrpc: '2.0', id: Date.now(), method: 'tools/call',
      params: { name: 'demo_query', arguments: {
        role: role,
        query: query,
        sql: sql
      }}
    });
    var data = JSON.parse(txt.result.content[0].text);

    animate(data.pipeline && data.pipeline.steps ? data.pipeline.steps : []);

    setTimeout(function() {
      var tbl = renderTable(data.result);
      if (data.pipeline && data.pipeline.overall_status === 'blocked') {
        var reason = '';
        if (data.audit && data.audit.policy_decisions_inbound && data.audit.policy_decisions_inbound.length) {
          reason = data.audit.policy_decisions_inbound[0].reason || '';
        }
        body.innerHTML = '<div class="blocked-msg">Request blocked: ' + esc(reason || 'access denied') + '</div>';
      } else if (tbl) {
        body.innerHTML = tbl;
      } else {
        body.innerHTML = '<pre style="white-space:pre-wrap;word-break:break-all;font-family:var(--mono);font-size:13px;color:var(--text-dim);">' + esc(data.result || 'no data') + '</pre>';
      }

      auditSection.style.display = 'block';
      document.getElementById('auditBody').innerHTML = jstr(data.audit);
      renderInsight(role, data.pipeline ? data.pipeline.overall_status : '', data.audit);

      // Backend badge
      var backendEl = document.getElementById('ctxBackend');
      var backendLabel = document.getElementById('ctxBackendLabel');
      var backendMeta = data.backend || {};
      var linkEl = document.getElementById('auditTemporalLink');
      var metaEl = document.getElementById('auditMeta');
      if (backendMeta.backend === 'temporal') {
        backendEl.className = 'ctx-backend temporal';
        backendLabel.textContent = 'Temporal';
        backendEl.style.display = 'inline-flex';
        if (backendMeta.temporal_ui_url) {
          linkEl.href = backendMeta.temporal_ui_url;
          linkEl.style.display = 'inline';
        }
        metaEl.textContent = backendMeta.workflow_id || '';
      } else {
        backendEl.className = 'ctx-backend async';
        backendLabel.textContent = 'Async';
        backendEl.style.display = 'inline-flex';
        linkEl.style.display = 'none';
        metaEl.textContent = '';
      }

      if (data.audit && data.audit.latency_ms) {
        document.getElementById('ctxLatency').textContent = Math.round(data.audit.latency_ms) + 'ms';
      }
    }, data.pipeline && data.pipeline.steps ? data.pipeline.steps.length * 160 + 200 : 300);

  } catch (e) {
    body.innerHTML = '<div class="err-msg">' + esc(e.message) + '</div>';
    STEPS.forEach(function(s) {
      document.getElementById('n' + s.id).className = 'p-node fail';
      document.getElementById('n' + s.id).textContent = ICONS.fail;
    });
    document.getElementById('insightBody').innerHTML = '<strong>Request failed.</strong> ' + esc(e.message);
    insightEl.classList.add('show');
  }
}

document.addEventListener('DOMContentLoaded', function() { init().catch(function() {}); });
</script>
</body>
</html>
